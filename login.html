<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Recycle Marketplace — Masuk</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root{--green-dark:#1a3d2b;--green-mid:#2d6a4f;--green-light:#52b788;--green-pale:#b7e4c7;--cream:#f4f1e8;--amber:#e9c46a;--white:#ffffff;--text-dark:#1c1c1e;--text-muted:#6b7280;}
    *{box-sizing:border-box;}
    body{font-family:'DM Sans',sans-serif;background:linear-gradient(135deg,var(--green-dark) 0%,var(--green-mid) 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;}
    h1,h2,h3{font-family:'Playfair Display',serif;}

    .login-wrap{width:100%;max-width:480px;}
    .login-card{background:var(--white);border-radius:24px;padding:2.8rem;box-shadow:0 20px 60px rgba(0,0,0,.3);width:100%;}
    .login-logo{font-family:'Playfair Display',serif;font-size:1.9rem;font-weight:900;color:var(--green-dark);}
    .login-logo span{color:var(--green-light);}

    .tab-toggle{display:flex;background:#f3f4f6;border-radius:12px;padding:4px;margin-bottom:2rem;}
    .tab-btn{flex:1;padding:.6rem;border:none;background:transparent;border-radius:9px;font-size:.88rem;font-weight:600;color:var(--text-muted);cursor:pointer;transition:all .2s;}
    .tab-btn.active{background:var(--white);color:var(--green-dark);box-shadow:0 1px 8px rgba(0,0,0,.1);}

    .form-control-custom{border:2px solid #e5e7eb;border-radius:10px;padding:.75rem 1rem;font-size:.9rem;transition:all .2s;width:100%;}
    .form-control-custom:focus{border-color:var(--green-light);box-shadow:0 0 0 3px rgba(82,183,136,.15);outline:none;}
    .form-label-custom{font-weight:600;font-size:.85rem;margin-bottom:.4rem;display:block;color:var(--text-dark);}

    .btn-submit{background:var(--green-dark);color:var(--white);border:none;border-radius:10px;padding:.85rem;font-weight:700;font-size:.95rem;width:100%;transition:all .2s;cursor:pointer;}
    .btn-submit:hover{background:var(--green-mid);transform:translateY(-1px);}
    .btn-google{background:var(--white);color:var(--text-dark);border:2px solid #e5e7eb;border-radius:10px;padding:.75rem;font-weight:600;font-size:.88rem;width:100%;cursor:pointer;transition:all .2s;}
    .btn-google:hover{border-color:var(--green-light);background:#f9fafb;}

    .divider{display:flex;align-items:center;gap:.75rem;margin:1.2rem 0;}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:#e5e7eb;}
    .divider span{font-size:.78rem;color:var(--text-muted);}

    .back-link{display:block;text-align:center;margin-top:1.5rem;color:rgba(255,255,255,.7);font-size:.85rem;text-decoration:none;transition:color .2s;}
    .back-link:hover{color:var(--amber);}

    .form-section{display:none;}
    .form-section.active{display:block;}

    .password-wrap{position:relative;}
    .password-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:1rem;}

    .alert-success-custom{background:#d8f3dc;border:none;border-radius:10px;color:var(--green-dark);font-size:.88rem;padding:.75rem 1rem;}
  </style>
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <!-- Logo -->
    <div class="text-center mb-4">
      <div class="login-logo">Recycle Marketplace</div>
      <p style="color:var(--text-muted);font-size:.85rem;margin-top:.3rem">Platform Daur Ulang Terpercaya</p>
    </div>

    <!-- Tab Toggle -->
    <div class="tab-toggle">
      <button class="tab-btn active" id="btnLogin" onclick="switchTab('login')">Masuk</button>
      <button class="tab-btn" id="btnRegister" onclick="switchTab('register')">Daftar</button>
    </div>

    <!-- LOGIN FORM -->
    <div class="form-section active" id="loginForm">
      <div class="mb-3">
        <label class="form-label-custom">Email</label>
        <input type="email" class="form-control-custom" placeholder="contoh@email.com"/>
      </div>
      <div class="mb-1">
        <label class="form-label-custom">Kata Sandi</label>
        <div class="password-wrap">
          <input type="password" class="form-control-custom" id="pwd1" placeholder="••••••••"/>
          <button class="password-toggle" onclick="togglePwd('pwd1','ic1')"><i class="bi bi-eye" id="ic1"></i></button>
        </div>
      </div>
      <div class="text-end mb-3"><a href="#" style="font-size:.8rem;color:var(--green-mid);text-decoration:none">Lupa kata sandi?</a></div>
      <button class="btn-submit mb-3" onclick="window.location.href='admin.html'">Masuk <i class="bi bi-arrow-right ms-1"></i></button>
      <div class="divider"><span>atau masuk dengan</span></div>
      <button class="btn-google"><i class="bi bi-google me-2" style="color:#ea4335"></i>Google</button>
      <p class="text-center mt-3" style="font-size:.85rem;color:var(--text-muted)">Belum punya akun? <a onclick="switchTab('register')" style="color:var(--green-mid);font-weight:600;cursor:pointer">Daftar sekarang</a></p>
    </div>

    <!-- REGISTER FORM -->
    <div class="form-section" id="registerForm">
      <div class="row g-3">
        <div class="col-6">
          <label class="form-label-custom">Nama Depan</label>
          <input type="text" class="form-control-custom" placeholder="Nama Depan"/>
        </div>
        <div class="col-6">
          <label class="form-label-custom">Nama Belakang</label>
          <input type="text" class="form-control-custom" placeholder="Nama Belakang"/>
        </div>
        <div class="col-12">
          <label class="form-label-custom">Email</label>
          <input type="email" class="form-control-custom" placeholder="....@email.com"/>
        </div>
        <div class="col-12">
          <label class="form-label-custom">Kata Sandi</label>
          <div class="password-wrap">
            <input type="password" class="form-control-custom" id="pwd2" placeholder="Min. 8 karakter"/>
            <button class="password-toggle" onclick="togglePwd('pwd2','ic2')"><i class="bi bi-eye" id="ic2"></i></button>
          </div>
        </div>
        <div class="col-12">
          <label class="form-label-custom">Konfirmasi Kata Sandi</label>
          <input type="password" class="form-control-custom" placeholder="Ulangi kata sandi"/>
        </div>
        <div class="col-12">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="agree"/>
            <label class="form-check-label" for="agree" style="font-size:.82rem;color:var(--text-muted)">Saya setuju dengan <a href="#" style="color:var(--green-mid)">Syarat & Ketentuan</a> dan <a href="#" style="color:var(--green-mid)">Kebijakan Privasi</a></label>
          </div>
        </div>
        <div class="col-12">
          <button class="btn-submit">Buat Akun <i class="bi bi-arrow-right ms-1"></i></button>
        </div>
      </div>
      <p class="text-center mt-3" style="font-size:.85rem;color:var(--text-muted)">Sudah punya akun? <a onclick="switchTab('login')" style="color:var(--green-mid);font-weight:600;cursor:pointer">Masuk di sini</a></p>
    </div>
  </div>
  <a class="back-link" href="index.html"><i class="bi bi-arrow-left me-1"></i>Kembali ke Beranda</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  function switchTab(tab) {
    document.getElementById('loginForm').classList.toggle('active', tab === 'login');
    document.getElementById('registerForm').classList.toggle('active', tab === 'register');
    document.getElementById('btnLogin').classList.toggle('active', tab === 'login');
    document.getElementById('btnRegister').classList.toggle('active', tab === 'register');
  }
  function togglePwd(inputId, iconId) {
    const input = document.getElementById(inputId);
    const icon = document.getElementById(iconId);
    if (input.type === 'password') { input.type = 'text'; icon.classList.replace('bi-eye','bi-eye-slash'); }
    else { input.type = 'password'; icon.classList.replace('bi-eye-slash','bi-eye'); }
  }
</script>
</body>
</html>
